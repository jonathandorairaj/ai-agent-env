version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trip-planner-api
    ports:
      - "8000:8000"
    env_file:
      - .env

  ui:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: trip-planner-ui
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - api
