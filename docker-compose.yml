version: "3.9"

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trip-planner-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - OTEL_SERVICE_NAME=voyage-api
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-lgtm:4318
      - ENVIRONMENT=production
    networks:
      - default
      - internal-network

  web:
    image: nginx:alpine
    container_name: trip-planner-web
    ports:
      - "3000:80"
    volumes:
      - ./html-frontend:/usr/share/nginx/html:ro
    depends_on:
      - api

networks:
  internal-network:
    name: internal-network
